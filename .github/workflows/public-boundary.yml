name: Public repository boundary

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  boundary:
    runs-on: ubuntu-24.04
    # A clean full suite has taken about seven minutes. Keep roughly 2x margin
    # for isolated dependency installation and shared-runner variance.
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false
      - name: Install pinned Python requirements
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --disable-pip-version-check --no-input --requirement tools/requirements.txt
          .venv/bin/python -m pip check
      - name: Enforce public capability claims
        run: .venv/bin/python tools/check_truth.py
      - name: Test public capability gate
        run: .venv/bin/python -m unittest discover -s tools -p 'test_*.py'
      - name: Enforce public-only artifact boundary
        run: .venv/bin/python tools/check_public_boundary.py
